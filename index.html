<!doctype html>
<html lang="en" data-textsize="m">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NOVA — study notes</title>
  <meta name="description" content="Student-made, unofficial study notes. Read on any phone.">
  <meta name="theme-color" id="meta-theme" content="#F9F6F0">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23F9F6F0'/%3E%3Crect x='23' y='13' width='18' height='9' rx='4' fill='%23111827' transform='rotate(-3 32 17)'/%3E%3Crect x='17' y='27' width='30' height='10' rx='5' fill='%23111827' transform='rotate(2 32 32)'/%3E%3Crect x='11' y='42' width='42' height='11' rx='5' fill='%23111827' transform='rotate(-2 32 47)'/%3E%3C/svg%3E">

  <!-- Theme (light/dark/auto) is applied BEFORE styles load so there is no flash -->
  <script>
    (function () {
      var theme = "auto";
      try { theme = localStorage.getItem("nova.theme") || "auto"; } catch (err) {}
      if (theme !== "light" && theme !== "dark") theme = "auto";
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>

  <!-- Font: Delius Swash Caps (hand-lettered, doodle design system) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Delius+Swash+Caps&display=swap" rel="stylesheet">

  <!-- Pinned libraries: marked (Markdown -> HTML) + DOMPurify (sanitizer). -->
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <!-- No-build cache-busting: version.js sets window.ASSET_V, then our own
       assets are attached with ?v=<ASSET_V> so browsers refresh after updates. -->
  <script src="version.js"></script>
  <script>
    (function () {
      var v = encodeURIComponent(window.ASSET_V || "1");
      var css = document.createElement("link");
      css.rel = "stylesheet";
      css.href = "styles.css?v=" + v;
      document.head.appendChild(css);
      ["config.js", "app.js"].forEach(function (src) {
        var s = document.createElement("script");
        s.src = src + "?v=" + v;
        s.async = false; /* keeps load order: config before app */
        document.head.appendChild(s);
      });
    })();
  </script>
</head>
<body>
  <div id="app">
    <div class="boot"><span class="mono-label">LOADING — CAIRN</span></div>
  </div>

  <!-- Settings sheet (language, text size). Filled in by app.js. -->
  <div id="settings-layer" aria-hidden="true"></div>

  <noscript>
    <div style="padding:2rem;font-family:monospace">
      This site needs JavaScript turned on to display notes.
    </div>
  </noscript>
</body>
</html>
